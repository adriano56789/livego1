server {
    listen 80;
    server_name livego.store 72.60.249.175;

    # Frontend - Pasta onde você deu o 'npm run build'
    root /var/www/livego/dist;
    index index.html;

    # Suporte para rotas do React (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para o Backend (Node.js na porta 3000)
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Log de erros para debug 
    error_log  /var/log/nginx/livego_error.log;
    access_log /var/log/nginx/livego_access.log;
}